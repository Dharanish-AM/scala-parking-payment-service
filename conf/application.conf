# Application
app.name = "Parking Payment Service"
app.version = "1.0.0"

play.http.secret.key = "dev-secret-key-change-in-prod"

# Server
play.server.provider = play.core.server.NettyServerProvider
play.server.http.port = 9000

# Database
slick.dbs.default.profile = "slick.jdbc.MySQLProfile$"
slick.dbs.default.db.driver = "com.mysql.cj.jdbc.Driver"
slick.dbs.default.db.url = "jdbc:mysql://localhost:3306/scala-parking-payment-service"
slick.dbs.default.db.user = "root"
slick.dbs.default.db.password = "root"

# Connection pool
slick.dbs.default.db.numThreads = 5
slick.dbs.default.db.maxConnections = 5
slick.dbs.default.db.minConnections = 2
